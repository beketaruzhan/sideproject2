<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerva Admissions Roadmap</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'minerva-blue': '#003554',
                    }
                }
            }
        }
    </script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts: Inter for a clean, professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <!-- Header: Establishing the brand identity -->
    <header class="bg-minerva-blue text-white py-8 shadow-lg">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Minerva Applicant Roadmap</h1>
            <p class="text-blue-100 text-lg opacity-90">Calculate your strategic path to a high-performance application.</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 flex-grow max-w-4xl">
        <!-- Input Section: Where the user defines their goal -->
        <section class="bg-white rounded-xl shadow-md p-6 md:p-8 mb-12">
            <div class="max-w-md mx-auto">
                <label for="targetDate" class="block text-sm font-semibold text-gray-700 mb-2">
                    Target Application Deadline
                </label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="date" id="targetDate" 
                        class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-minerva-blue focus:outline-none transition-all shadow-sm"
                        aria-label="Select your application deadline">
                    <button id="calculateBtn" 
                        class="bg-minerva-blue hover:bg-blue-900 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-minerva-blue">
                        Generate Roadmap
                    </button>
                </div>
                <p class="mt-3 text-xs text-gray-500 italic">We'll calculate your milestones backwards from this date.</p>
            </div>
        </section>

        <!-- Timeline Section: Dynamically populated via JavaScript -->
        <section id="roadmapContainer" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-minerva-blue">Your Personalized Timeline</h2>
                <button id="exportIcs" class="flex items-center gap-2 text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg transition-all border border-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Export to Calendar (.ics)
                </button>
            </div>

            <!-- Vertical Timeline Container -->
            <div id="timeline" class="relative border-l-2 border-blue-200 ml-4 md:ml-6 space-y-12 pb-8">
                <!-- Milestones will be injected here -->
            </div>
        </section>

        <!-- Empty State -->
        <section id="emptyState" class="text-center py-12">
            <div class="bg-blue-50 inline-block p-4 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-minerva-blue opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <p class="text-gray-500 text-lg">Enter your deadline above to start your roadmap.</p>
        </section>
    </main>

    <!-- Footer: Transparency & Disclosure -->
    <footer class="bg-gray-100 border-t border-gray-200 py-8">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-gray-600 text-sm">
                &copy; 2026 Minerva University Student Project
            </div>
            <div class="flex items-center gap-4">
                <!-- MANDATORY AI DISCLOSURE -->
                <div class="bg-white border border-gray-300 rounded px-3 py-1 flex items-center gap-2 shadow-sm">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-gray-700 uppercase tracking-wider">AI-Assisted</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Application Logic -->
    <script src="js/app.js"></script>
</body>
</html>
